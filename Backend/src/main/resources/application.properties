server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/hdfs_cloud_drive_db?useUnicode=true&characterEncoding=utf-8&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=your_db_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=

spring.mail.host=smtp.qq.com
spring.mail.port=587
spring.mail.username=your_email@qq.com
spring.mail.password=your_mail_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

hdfs.uri=hdfs://localhost:8020
hdfs.upload.dir=/user/files
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=510MB

app.share.domain=http://localhost:5173

# AI 配置（DeepSeek）
ai.api.url=https://api.deepseek.com/v1/chat/completions
ai.api.key=your_deepseek_api_key

# ======================= HDFS ?? =======================
hadoop.uri=hdfs://localhost:9000
hadoop.hdfs.user=hadoop
hadoop.hdfs.temp=/tmp
